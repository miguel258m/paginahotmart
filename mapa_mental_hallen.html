<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental — Plataforma Digital Hallen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1b2a;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    overflow-x: auto;
  }

  h1.titulo {
    text-align: center;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 400;
    padding: 18px 0 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  svg#mapa {
    display: block;
    margin: 0 auto;
  }

  /* ── Nodo central ── */
  .centro rect { fill: #1A3C5E; rx: 18; }
  .centro text { fill: #fff; font-size: 15px; font-weight: 700; }

  /* ── Ramas principales ── */
  .rama-label {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ── Sub-nodos ── */
  .sub text { font-size: 11px; fill: #dde6f0; }
  .sub rect { rx: 8; opacity: 0.92; }

  /* ── Hojas ── */
  .hoja text { font-size: 10px; fill: #b0c4de; }
  .hoja rect { rx: 6; opacity: 0.75; }

  /* ── Líneas ── */
  .linea { fill: none; stroke-width: 2; opacity: 0.55; }

  /* ── Etiqueta de costo ── */
  .badge rect { rx: 10; }
  .badge text { font-size: 10.5px; font-weight: 700; fill: #fff; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: #1e3a5f;
    color: #e0eaf5;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    border: 1px solid #2e6da4;
    max-width: 240px;
    line-height: 1.5;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<h1 class="titulo">Plataforma Digital Hallen — Mapa Mental Estratégico</h1>

<svg id="mapa" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <filter id="sombra">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="dot-azul" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.5" fill="#2e6da4"/>

    <marker id="dot-verde" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.5" fill="#1e7e34"/>
    </marker>
    <marker id="dot-naranja" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.5" fill="#d96b00"/>
    </marker>
    <marker id="dot-morado" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.5" fill="#6a3d9a"/>
    </marker>
  </defs>

  <!-- ════════════════════════════════════════════
       LÍNEAS DE RAMA PRINCIPALES
  ════════════════════════════════════════════ -->
  <!-- Fase 1 → izquierda arriba -->
  <path class="linea" stroke="#2e6da4" d="M 570,390 C 480,360 380,240 290,210" marker-start="url(#dot-azul)"/>
  <!-- Fase 2 → izquierda abajo -->
  <path class="linea" stroke="#1e7e34" d="M 570,420 C 480,450 380,540 290,570" marker-start="url(#dot-verde)"/>
  <!-- Fase 3 → derecha arriba -->
  <path class="linea" stroke="#d96b00" d="M 710,390 C 800,350 890,240 990,210" marker-start="url(#dot-naranja)"/>
  <!-- Costos → derecha abajo -->
  <path class="linea" stroke="#6a3d9a" d="M 710,420 C 800,460 890,540 990,570" marker-start="url(#dot-morado)"/>

  <!-- ════════════════════════════════════════════
       NODO CENTRAL
  ════════════════════════════════════════════ -->
  <g filter="url(#sombra)">
    <rect x="555" y="360" width="170" height="90" rx="18" fill="#1A3C5E"/>
    <text x="640" y="393" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" font-family="Segoe UI, Arial">HALLEN</text>
    <text x="640" y="412" text-anchor="middle" fill="#90b8d8" font-size="11" font-family="Segoe UI, Arial">Plataforma Digital</text>
    <text x="640" y="430" text-anchor="middle" fill="#90b8d8" font-size="10" font-family="Segoe UI, Arial">Cursos · IA · Suscripciones</text>
  </g>

  <!-- ════════════════════════════════════════════
       FASE 1 — IZQUIERDA ARRIBA (Azul)
  ════════════════════════════════════════════ -->
  <!-- Nodo principal Fase 1 -->
  <g filter="url(#sombra)" data-tip="Duración: 4–8 semanas | Objetivo: web + membresía + cursos funcionando">

    <text x="260" y="195" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" font-family="Segoe UI, Arial">FASE 1</text>
    <text x="260" y="213" text-anchor="middle" fill="#c8dff5" font-size="10.5" font-family="Segoe UI, Arial">Web + Membresía + Cursos</text>
  </g>
  <!-- Badge costo -->
  <g><rect x="218" y="232" width="84" height="20" rx="10" fill="#1a4f80"/>
  <text x="260" y="246" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="700" font-family="Segoe UI, Arial">~$11 / mes</text></g>

  <!-- Sub-nodos Fase 1 -->
  <!-- Stack Tech -->
  <path class="linea" stroke="#2e6da4" d="M 230,226 C 180,270 130,290 80,295"/>
  <g filter="url(#sombra)" data-tip="Next.js + Supabase + Bunny.net + Stripe">

    <text x="80" y="293" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="700" font-family="Segoe UI, Arial">Stack Tecnológico</text>
    <text x="80" y="307" text-anchor="middle" fill="#90b8d8" font-size="9.5" font-family="Segoe UI, Arial">Next.js · Supabase · Stripe</text>
  </g>

  <!-- Hojas Stack -->

    <text x="345" y="313" text-anchor="middle" fill="#90b8d8" font-size="9.5" font-family="Segoe UI, Arial">Bunny.net · Privado</text>

  <path class="linea" stroke="#1e7e34" stroke-width="1.2" d="M 10,638 C -15,655 -10,670 15,672"/>
  <rect x="10" y="662" width="140" height="20" rx="6" fill="#0f3d1f" opacity="0.9"/>
  <text x="80" y="676" text-anchor="middle" fill="#6ee7a0" font-size="9" font-family="Segoe UI, Arial">C1: Vender sin publicidad paga</text>

  <path class="linea" stroke="#1e7e34" stroke-width="1.2" d="M 10,645 C -5,690 5,706 25,710"/>

  <!-- Sub Suscripción -->

    <text x="377" y="677" text-anchor="middle" fill="#6ee7a0" font-size="9.5" font-family="Segoe UI, Arial">Webhook · Membresía auto</text>
  </g>

  <!-- ════════════════════════════════════════════
       FASE 3 — DERECHA ARRIBA (Naranja)
  ════════════════════════════════════════════ -->
  <g filter="url(#sombra)" data-tip="Duración: mes 3–6 | Objetivo: GPTs por nicho + automatizaciones de contenido con IA">

  </g>
  <g><rect x="974" y="232" width="112" height="20" rx="10" fill="#7a3800"/>
  <text x="1030" y="246" text-anchor="middle" fill="#ffa94d" font-size="10" font-weight="700" font-family="Segoe UI, Arial">$48–$213 / mes</text></g>

  <!-- Sub GPTs por Nicho -->
  <path class="linea" stroke="#d96b00" d="M 1040,226 C 1080,265 1110,280 1130,292"/>

  </g>

  <rect x="1135" y="310" width="130" height="20" rx="6" fill="#5a2900" opacity="0.9"/>
  <text x="1200" y="324" text-anchor="middle" fill="#ffd4a0" font-size="9" font-family="Segoe UI, Arial">API OpenAI — $10–$50/mes</text>

  <path class="linea" stroke="#d96b00" stroke-width="1.2" d="M 1210,290 C 1240,340 1235,360 1220,368"/>
  <rect x="1135" y="358" width="130" height="20" rx="6" fill="#5a2900" opacity="0.9"/>
  <text x="1200" y="372" text-anchor="middle" fill="#ffd4a0" font-size="9" font-family="Segoe UI, Arial">Integrado en la plataforma</text>

    <text x="1002" y="313" text-anchor="middle" fill="#ffd4a0" font-size="9.5" font-family="Segoe UI, Arial">HeyGen · Synthesia</text>
  </g>

  <!-- Sub Automatizaciones -->
  <path class="linea" stroke="#d96b00" d="M 960,226 C 920,265 900,278 880,292"/>

       COSTOS — DERECHA ABAJO (Morado)

<div id="tooltip"></div>

<script>
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('[data-tip]').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('mouseenter', e => {
      tooltip.textContent = el.getAttribute('data-tip');
      tooltip.style.display = 'block';
    });
    el.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
</script>
</body>
</html>
