<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenda — Iniciar sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f9f7f4;--accent:#6c47ff;--accent2:#8b6fff;--text:#1a1a1a;--text2:#6b7280;--border:#e8e4dc;--danger:#ef4444;--success:#00c48c;--shadow:rgba(108,71,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;min-height:100vh;position:relative;overflow:hidden;}
.page::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 60% at 50% 0%,rgba(108,71,255,.08),transparent 70%);}
.card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.08);animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:.3rem;}
.logo span{color:var(--accent);}
.card-sub{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:2rem;font-weight:300;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em;}
.form-group input{width:100%;padding:.85rem 1rem;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);transition:.25s;outline:none;}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,71,255,.1);background:#fff;}
.btn-login{width:100%;padding:.9rem;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:.3s;margin-top:.5rem;box-shadow:0 6px 20px var(--shadow);}
.btn-login:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.back-link{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--text2);}
.back-link a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none;}
.loading-spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:.85rem 1rem;border-radius:12px;font-size:.85rem;margin-bottom:1rem;display:none;align-items:center;gap:.6rem;}
.alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--danger);display:flex;}
.alert.success{background:rgba(0,196,140,.1);border:1px solid rgba(0,196,140,.2);color:var(--success);display:flex;}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo">zen<span>da</span></div>
    <p class="card-sub">Ingresa a tu panel de gestión</p>
    <div class="alert" id="alertBox"></div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="tucorreo@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span id="loginBtnText">Iniciar sesión</span>
      <div class="loading-spinner" id="loginSpinner"></div>
    </button>
    <div class="back-link"><a href="index.html">← Volver al inicio</a></div>
  </div>
</div>
<script type="module">
import { loginEmail, escucharAuth, obtenerUsuario } from './firebase.js';

function showAlert(type, msg) {
  const el = document.getElementById('alertBox');
  el.className = 'alert ' + type;
  el.innerHTML = (type==='error'?'⚠️ ':'✅ ') + msg;
}
function setLoading(loading) {
  document.getElementById('loginBtn').disabled = loading;
  document.getElementById('loginBtnText').style.display = loading?'none':'block';
  document.getElementById('loginSpinner').style.display = loading?'block':'none';
}
window.handleLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email||!pass) { showAlert('error','Completa todos los campos'); return; }
  setLoading(true);
  try {
    const cred = await loginEmail(email, pass);
    const user = await obtenerUsuario(cred.user.uid);
    if (!user) throw new Error('Usuario no encontrado');
    if (user.rol==='superadmin') window.location.href='superadmin.html';
    else if (user.rol==='negocio') window.location.href=`dashboard.html?negocio=${user.negocioId}`;
    else throw new Error('Rol no reconocido');
  } catch(e) {
    const msgs = {'auth/user-not-found':'No existe una cuenta con ese correo','auth/wrong-password':'Contraseña incorrecta','auth/invalid-email':'Correo inválido','auth/too-many-requests':'Demasiados intentos. Espera un momento','auth/invalid-credential':'Email o contraseña incorrectos'};
    showAlert('error', msgs[e.code]||e.message||'Error al iniciar sesión');
    setLoading(false);
  }
};
escucharAuth(async (user) => {
  if (user) {
    const datos = await obtenerUsuario(user.uid);
    if (datos?.rol==='superadmin') window.location.href='superadmin.html';
    else if (datos?.rol==='negocio') window.location.href=`dashboard.html?negocio=${datos.negocioId}`;
  }
});
</script>
</body>
</html>
